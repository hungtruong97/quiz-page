<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCP Exam Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <!-- ===================== HOME PAGE ===================== -->
    <div id="home-page">
      <div class="home-badge">Google Cloud Certifications</div>
      <h1 class="home-title">Exam Practice</h1>
      <p class="home-sub">
        Select a certification track and choose an exam to begin.
      </p>
      <div class="categories" id="categories">
        <div class="loading-placeholder">Loading exams…</div>
      </div>
    </div>

    <!-- ===================== EXAM PAGE ===================== -->
    <div id="exam-page">
      <div class="progress-bar-wrap">
        <div
          class="progress-bar-fill"
          id="progress-fill"
          style="width: 0%"
        ></div>
      </div>
      <div class="exam-header">
        <button class="exam-logo" onclick="goHome()">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Home
        </button>
        <div class="breadcrumbs">
          <div class="breadcrumb-track" id="breadcrumb-track"></div>
        </div>
        <div class="exam-counter">
          Q <span id="counter-current">1</span> /
          <span id="counter-total">—</span>
        </div>
      </div>
      <div class="exam-body">
        <div class="question-meta">
          <span class="q-number" id="q-number">Question 01</span>
          <span class="q-type-badge" id="q-type-badge"></span>
        </div>
        <div class="question-text" id="question-text"></div>
        <div class="options-list" id="options-list"></div>
        <div class="result-banner" id="result-banner">
          <div class="result-label" id="result-label"></div>
          <div class="result-correct-ans" id="result-correct-ans"></div>
        </div>
        <div class="explanation-box" id="explanation-box">
          <div class="explanation-label">Explanation</div>
          <div class="explanation-text" id="explanation-text"></div>
        </div>
        <div class="actions">
          <button
            class="btn btn-submit"
            id="submit-btn"
            onclick="submitAnswer()"
          >
            Submit Answer
          </button>
          <button
            class="btn btn-next"
            id="next-btn"
            onclick="nextQuestion()"
            style="display: none"
          >
            Next
          </button>
          <button class="btn btn-home" onclick="goHome()">← Home</button>
        </div>
      </div>
    </div>

    <!-- ===================== RESULTS PAGE ===================== -->
    <div id="results-page">
      <div class="results-header">
        <div class="results-label">Exam Complete</div>
        <h2 class="results-title" id="results-grade">Well done!</h2>
      </div>

      <div class="score-ring-wrap">
        <div class="score-ring">
          <svg viewBox="0 0 160 160">
            <circle class="score-ring-bg" cx="80" cy="80" r="65" />
            <circle
              class="score-ring-fill"
              id="score-ring-fill"
              cx="80"
              cy="80"
              r="65"
              stroke-dasharray="408.41"
              stroke-dashoffset="408.41"
            />
          </svg>
          <div class="score-ring-text">
            <span class="score-pct" id="score-pct">—</span>
            <span class="score-sub" id="score-sub">— / —</span>
          </div>
        </div>
      </div>

      <div class="results-stats">
        <div class="rstat">
          <div class="rstat-num green" id="rstat-correct">—</div>
          <div class="rstat-label">Correct</div>
        </div>
        <div class="rstat">
          <div class="rstat-num red" id="rstat-wrong">—</div>
          <div class="rstat-label">Wrong</div>
        </div>
        <div class="rstat">
          <div class="rstat-num text2" id="rstat-total">—</div>
          <div class="rstat-label">Total</div>
        </div>
      </div>

      <div class="results-actions">
        <button class="btn btn-submit" onclick="goHome()">
          ← Back to Home
        </button>
      </div>

      <div class="wrong-section">
        <div class="wrong-section-title">Questions You Got Wrong</div>
        <div id="wrong-answers-list"></div>
      </div>
    </div>

    <!-- Theme toggle -->
    <button
      class="theme-toggle"
      onclick="toggleTheme()"
      id="theme-toggle"
      title="Toggle light/dark mode"
    >
      🌙
    </button>
  </body>
</html>
