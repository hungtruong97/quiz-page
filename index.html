<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCP Data Engineer — Exam Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f1a;
    --surface: #131726;
    --surface2: #1a1f33;
    --border: #252b42;
    --border2: #2f3752;
    --accent: #4f8ef7;
    --accent-glow: rgba(79,142,247,0.18);
    --accent2: #7c3aed;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.10);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.10);
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,142,247,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(124,58,237,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HOMEPAGE ===== */
  #home-page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .home-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-glow);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .home-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .home-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 72px);
    text-align: center;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .home-sub {
    font-size: 17px;
    color: var(--text2);
    text-align: center;
    max-width: 480px;
    margin-bottom: 48px;
    font-weight: 300;
  }

  .home-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 48px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px;
    text-align: center;
    min-width: 120px;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }

  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 16px 36px;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    box-shadow: 0 0 32px rgba(79,142,247,0.25);
  }

  .start-btn:hover {
    background: #6fa3f9;
    transform: translateY(-2px);
    box-shadow: 0 0 48px rgba(79,142,247,0.4);
  }

  .start-btn svg { transition: transform 0.2s; }
  .start-btn:hover svg { transform: translateX(4px); }

  /* ===== EXAM PAGE ===== */
  #exam-page {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 0;
  }

  .exam-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,15,26,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .exam-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    white-space: nowrap;
  }

  .exam-logo span { color: var(--accent); }

  .breadcrumbs {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
    justify-content: center;
    overflow: hidden;
  }

  .breadcrumb-track {
    display: flex;
    align-items: center;
    gap: 3px;
    max-width: 100%;
    overflow: hidden;
  }

  .crumb {
    width: 22px;
    height: 6px;
    border-radius: 3px;
    background: var(--border2);
    transition: all 0.3s;
    cursor: pointer;
    flex-shrink: 0;
  }

  .crumb.done { background: var(--green); opacity: 0.7; }
  .crumb.done:hover { opacity: 1; }
  .crumb.current { background: var(--accent); width: 32px; }
  .crumb.wrong { background: var(--red); opacity: 0.7; }
  .crumb.wrong:hover { opacity: 1; }

  .exam-counter {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    white-space: nowrap;
  }

  .exam-counter span { color: var(--text2); font-weight: 500; }

  /* ===== QUESTION AREA ===== */
  .exam-body {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .question-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .q-number {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .q-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .q-type-badge.single {
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.25);
  }

  .q-type-badge.multi {
    background: rgba(124,58,237,0.12);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.25);
  }

  .question-text {
    font-size: 18px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 32px;
    font-weight: 400;
  }

  /* strip the "Choose only ONE..." instruction line */
  .instruction-hint {
    display: block;
    font-size: 13px;
    color: var(--text3);
    font-style: italic;
    margin-top: 12px;
  }

  /* ===== OPTIONS ===== */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .option-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-glow);
    opacity: 0;
    transition: opacity 0.18s;
  }

  .option-item:hover { border-color: var(--border2); }
  .option-item:hover::before { opacity: 1; }

  .option-item.selected {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .option-item.selected::before { opacity: 1; }

  .option-item.correct {
    border-color: var(--green) !important;
    background: var(--green-bg) !important;
  }

  .option-item.correct::before { opacity: 0 !important; }

  .option-item.wrong {
    border-color: var(--red) !important;
    background: var(--red-bg) !important;
  }

  .option-item.wrong::before { opacity: 0 !important; }

  .option-item.missed {
    border-color: var(--yellow) !important;
    background: rgba(245,158,11,0.08) !important;
  }

  .option-item.disabled { cursor: default; pointer-events: none; }

  .option-control {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    background: transparent;
  }

  .option-item.checkbox .option-control { border-radius: 5px; }

  .option-item.selected .option-control,
  .option-item.correct .option-control,
  .option-item.wrong .option-control {
    border-color: currentColor;
  }

  .option-item.correct .option-control { color: var(--green); border-color: var(--green); background: rgba(34,197,94,0.2); }
  .option-item.wrong .option-control { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.2); }
  .option-item.missed .option-control { color: var(--yellow); border-color: var(--yellow); background: rgba(245,158,11,0.15); }
  .option-item.selected:not(.correct):not(.wrong) .option-control { border-color: var(--accent); }

  .option-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .option-item.selected:not(.correct):not(.wrong) .option-dot { opacity: 1; }

  .option-check {
    display: none;
    font-size: 13px;
    font-weight: 700;
  }

  .option-item.correct .option-check,
  .option-item.wrong .option-check,
  .option-item.missed .option-check { display: block; }

  .option-item.correct .option-check { color: var(--green); }
  .option-item.wrong .option-check { color: var(--red); }
  .option-item.missed .option-check { color: var(--yellow); }

  .option-item.correct .option-dot,
  .option-item.wrong .option-dot,
  .option-item.missed .option-dot { display: none; }

  .option-key {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    font-weight: 500;
    flex-shrink: 0;
    min-width: 20px;
    margin-top: 1px;
  }

  .option-item.selected .option-key { color: var(--accent); }
  .option-item.correct .option-key { color: var(--green); }
  .option-item.wrong .option-key { color: var(--red); }
  .option-item.missed .option-key { color: var(--yellow); }

  .option-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.55;
    flex: 1;
  }

  /* ===== ACTIONS ===== */
  .actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: var(--radius-sm);
    padding: 12px 24px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
  }

  .btn-submit {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(79,142,247,0.2);
  }

  .btn-submit:hover:not(:disabled) {
    background: #6fa3f9;
    box-shadow: 0 0 32px rgba(79,142,247,0.35);
  }

  .btn-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-next {
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    color: var(--text);
  }

  .btn-next:hover {
    background: var(--border2);
    border-color: var(--text3);
  }

  .btn-home {
    background: transparent;
    border: 1.5px solid var(--border2);
    color: var(--text2);
    font-size: 13px;
    padding: 10px 18px;
  }

  .btn-home:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ===== RESULT BANNER ===== */
  .result-banner {
    display: none;
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    border: 1.5px solid;
    animation: slideDown 0.3s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-banner.correct {
    background: var(--green-bg);
    border-color: rgba(34,197,94,0.35);
  }

  .result-banner.incorrect {
    background: var(--red-bg);
    border-color: rgba(239,68,68,0.35);
  }

  .result-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .result-banner.correct .result-label { color: var(--green); }
  .result-banner.incorrect .result-label { color: var(--red); }

  .result-correct-ans {
    font-size: 13px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    margin-bottom: 0;
  }

  /* ===== EXPLANATION ===== */
  .explanation-box {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 28px;
    animation: slideDown 0.35s ease 0.05s both;
  }

  .explanation-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 12px;
  }

  .explanation-text {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.75;
    white-space: pre-line;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    border-radius: 0 2px 2px 0;
  }

  /* ===== SUMMARY PAGE ===== */
  #summary-page {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 60px 24px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .summary-title {
    font-family: 'DM Serif Display', serif;
    font-size: 48px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .summary-score {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    color: var(--accent);
    text-align: center;
    line-height: 1;
    margin: 16px 0;
  }

  .summary-sub {
    color: var(--text2);
    text-align: center;
    font-size: 16px;
    margin-bottom: 48px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Mobile */
  @media (max-width: 600px) {
    .exam-header { padding: 12px 16px; }
    .exam-logo { display: none; }
    .exam-body { padding: 24px 16px 60px; }
    .question-text { font-size: 16px; }
    .crumb { width: 14px; }
    .crumb.current { width: 22px; }
  }
</style>
</head>
<body>

<!-- ===== HOME PAGE ===== -->
<div id="home-page">
  <div class="home-badge">Professional Data Engineer</div>
  <h1 class="home-title">GCP Exam<br>Practice</h1>
  <p class="home-sub">Test your knowledge across Cloud SQL, Bigtable, Spanner, Dataflow, BigQuery, and more.</p>
  <div class="home-stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">50</div>
      <div class="stat-label">Questions</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-single">—</div>
      <div class="stat-label">Single Answer</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-multi">—</div>
      <div class="stat-label">Multi Answer</div>
    </div>
  </div>
  <button class="start-btn" onclick="startExam()">
    Start Exam
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </button>
</div>

<!-- ===== EXAM PAGE ===== -->
<div id="exam-page">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="exam-header">
    <div class="exam-logo">GCP <span>Practice</span></div>
    <div class="breadcrumbs">
      <div class="breadcrumb-track" id="breadcrumb-track"></div>
    </div>
    <div class="exam-counter">Q <span id="counter-current">1</span> / <span id="counter-total">50</span></div>
  </div>
  <div class="exam-body">
    <div class="question-meta">
      <span class="q-number" id="q-number">Question 01</span>
      <span class="q-type-badge" id="q-type-badge"></span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options-list" id="options-list"></div>
    <div class="result-banner" id="result-banner">
      <div class="result-label" id="result-label"></div>
      <div class="result-correct-ans" id="result-correct-ans"></div>
    </div>
    <div class="explanation-box" id="explanation-box">
      <div class="explanation-label">Explanation</div>
      <div class="explanation-text" id="explanation-text"></div>
    </div>
    <div class="actions">
      <button class="btn btn-submit" id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
      <button class="btn btn-next" id="next-btn" onclick="nextQuestion()" style="display:none">
        Next
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <button class="btn btn-home" onclick="goHome()">Home</button>
    </div>
  </div>
</div>

<script>
let questions = [];
let current = 0;
let selected = new Set();
let answered = [];   // 'correct' | 'wrong' | null
let submitted = false;

// ---- Load JSON ----
async function loadQuestions() {
  const res = await fetch('exam1.json');
  questions = await res.json();
  // Update stats
  const singles = questions.filter(q => q.question_type === 'one_answer_only').length;
  const multis = questions.filter(q => q.question_type === 'multiple_answers').length;
  document.getElementById('stat-total').textContent = questions.length;
  document.getElementById('stat-single').textContent = singles;
  document.getElementById('stat-multi').textContent = multis;
  document.getElementById('counter-total').textContent = questions.length;
  answered = new Array(questions.length).fill(null);
  buildBreadcrumbs();
}

function buildBreadcrumbs() {
  const track = document.getElementById('breadcrumb-track');
  track.innerHTML = '';
  questions.forEach((_, i) => {
    const crumb = document.createElement('div');
    crumb.className = 'crumb' + (i === current ? ' current' : '');
    crumb.title = `Question ${i + 1}`;
    crumb.onclick = () => { if (answered[i] !== null) jumpTo(i); };
    track.appendChild(crumb);
  });
}

function updateBreadcrumbs() {
  const crumbs = document.querySelectorAll('.crumb');
  crumbs.forEach((c, i) => {
    c.className = 'crumb';
    if (i === current) c.classList.add('current');
    else if (answered[i] === 'correct') c.classList.add('done');
    else if (answered[i] === 'wrong') c.classList.add('wrong');
  });
}

function jumpTo(i) {
  current = i;
  renderQuestion();
}

function startExam() {
  current = 0;
  selected.clear();
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('exam-page').style.display = 'block';
  renderQuestion();
}

function goHome() {
  document.getElementById('exam-page').style.display = 'none';
  document.getElementById('home-page').style.display = 'flex';
}

function renderQuestion() {
  const q = questions[current];
  submitted = false;
  selected.clear();

  // If already answered, re-show with result
  const prevAnswer = answered[current];
  if (prevAnswer !== null) {
    // Will render in answered state
  }

  // Meta
  document.getElementById('q-number').textContent = `Question ${String(current + 1).padStart(2, '0')}`;
  document.getElementById('counter-current').textContent = current + 1;

  const isMulti = q.question_type === 'multiple_answers';
  const badge = document.getElementById('q-type-badge');
  badge.className = 'q-type-badge ' + (isMulti ? 'multi' : 'single');
  badge.textContent = isMulti ? 'Select all that apply' : 'Single answer';

  // Question text — strip the trailing instruction sentence
  let qText = q.question.replace(/\n+Choose only ONE best answer\.?$/i, '').replace(/\n+Choose all that apply\.?$/i, '').trim();
  document.getElementById('question-text').textContent = qText;

  // Options
  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const correctAnswers = q.correct_answer.split(',').map(a => a.trim());

  Object.entries(q.options).forEach(([key, text]) => {
    const item = document.createElement('div');
    item.className = 'option-item' + (isMulti ? ' checkbox' : '');
    item.dataset.key = key;
    item.onclick = () => toggleOption(key, isMulti, item);

    const control = document.createElement('div');
    control.className = 'option-control';

    const dot = document.createElement('div');
    dot.className = 'option-dot';
    const check = document.createElement('div');
    check.className = 'option-check';

    control.appendChild(dot);
    control.appendChild(check);

    const keyEl = document.createElement('span');
    keyEl.className = 'option-key';
    keyEl.textContent = key + '.';

    const textEl = document.createElement('span');
    textEl.className = 'option-text';
    textEl.textContent = text;

    item.appendChild(control);
    item.appendChild(keyEl);
    item.appendChild(textEl);
    list.appendChild(item);

    // If revisiting answered question
    if (prevAnswer !== null) {
      item.classList.add('disabled');
      const wasSelected = prevAnswer === 'correct'
        ? correctAnswers.includes(key)
        : false; // we'll handle below
    }
  });

  // Result / explanation
  document.getElementById('result-banner').style.display = 'none';
  document.getElementById('explanation-box').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'inline-flex';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('next-btn').style.display = 'none';

  // Progress
  const pct = (current / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  updateBreadcrumbs();

  // Scroll to top
  document.querySelector('.exam-body').scrollTop = 0;
  window.scrollTo(0, 0);
}

function toggleOption(key, isMulti, itemEl) {
  if (submitted) return;
  if (!isMulti) {
    // Radio: deselect all
    selected.clear();
    document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  }

  if (selected.has(key) && isMulti) {
    selected.delete(key);
    itemEl.classList.remove('selected');
  } else {
    selected.add(key);
    itemEl.classList.add('selected');
  }

  document.getElementById('submit-btn').disabled = selected.size === 0;
}

function submitAnswer() {
  if (selected.size === 0) return;
  submitted = true;

  const q = questions[current];
  const correctAnswers = q.correct_answer.split(',').map(a => a.trim());
  const selectedArr = Array.from(selected).sort();
  const isCorrect = selectedArr.length === correctAnswers.length &&
    selectedArr.every(a => correctAnswers.includes(a));

  answered[current] = isCorrect ? 'correct' : 'wrong';

  // Mark options
  document.querySelectorAll('.option-item').forEach(item => {
    const key = item.dataset.key;
    item.classList.add('disabled');
    const check = item.querySelector('.option-check');

    if (correctAnswers.includes(key) && selected.has(key)) {
      // Selected and correct
      item.classList.remove('selected');
      item.classList.add('correct');
      check.textContent = '✓';
    } else if (selected.has(key) && !correctAnswers.includes(key)) {
      // Selected but wrong
      item.classList.remove('selected');
      item.classList.add('wrong');
      check.textContent = '✗';
    } else if (correctAnswers.includes(key) && !selected.has(key)) {
      // Missed correct answer
      item.classList.add('missed');
      check.textContent = '↑';
    }
  });

  // Result banner
  const banner = document.getElementById('result-banner');
  const label = document.getElementById('result-label');
  const correctAns = document.getElementById('result-correct-ans');

  banner.className = 'result-banner ' + (isCorrect ? 'correct' : 'incorrect');
  banner.style.display = 'block';
  label.innerHTML = isCorrect
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Correct!'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Incorrect';

  if (!isCorrect) {
    correctAns.textContent = 'Correct answer: ' + correctAnswers.join(', ');
  } else {
    correctAns.textContent = '';
  }

  // Explanation
  const expBox = document.getElementById('explanation-box');
  document.getElementById('explanation-text').textContent = q.explanation;
  expBox.style.display = 'block';

  // Buttons
  document.getElementById('submit-btn').style.display = 'none';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'inline-flex';
  nextBtn.textContent = current === questions.length - 1 ? '↩ Back to Home' : 'Next';
  if (current < questions.length - 1) {
    nextBtn.innerHTML = 'Next <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }

  updateBreadcrumbs();
}

function nextQuestion() {
  if (current === questions.length - 1) {
    goHome();
    return;
  }
  current++;
  renderQuestion();
}

// Init
loadQuestions();
</script>
